<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Calendar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="calendar-panel" aria-label="Monthly calendar">
      <header class="topbar">
        <div>
          <h1>Monthly Planner</h1>
        </div>
        <div class="top-actions">
          <button class="share-button" id="shareButton" type="button">Share</button>
          <button class="today-button" id="todayButton" type="button">Today</button>
        </div>
      </header>

      <div class="month-toolbar">
        <button class="icon-button" id="prevMonth" type="button" aria-label="Previous month">‹</button>
        <h2 id="monthLabel">Month Year</h2>
        <button class="icon-button" id="nextMonth" type="button" aria-label="Next month">›</button>
      </div>

      <div class="weekday-row" aria-hidden="true">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <aside class="details-panel" aria-label="Event details">
      <div class="selected-date-block">
        <p class="eyebrow">Selected Date</p>
        <h2 id="selectedDateLabel">Today</h2>
      </div>

      <div class="shared-banner" id="sharedBanner" hidden>
        <p class="eyebrow">Shared View</p>
        <p>This calendar only shows the plans included in the shared link.</p>
      </div>

      <form class="event-form" id="eventForm">
        <label for="eventName">Event name</label>
        <input id="eventName" name="eventName" type="text" placeholder="Team meeting, appointment, deadline" required>

        <label for="eventDate">Date</label>
        <input id="eventDate" name="eventDate" type="date" required>

        <label for="eventInfo">Extra information <span>optional</span></label>
        <textarea id="eventInfo" name="eventInfo" rows="4" placeholder="Location, links, reminders, prep notes"></textarea>

        <button class="primary-button" type="submit">Add Event</button>
      </form>

      <section class="event-list-section" aria-label="Events for selected date">
        <div class="section-heading">
          <h3>Plans</h3>
          <span id="eventCount">0</span>
        </div>
        <div class="event-list" id="eventList"></div>
      </section>
    </aside>
  </main>

  <dialog class="share-dialog" id="shareDialog">
    <form class="share-form" id="shareForm">
      <div class="share-header">
        <div>
          <p class="eyebrow">Share Plans</p>
          <h2>Choose What They Can See</h2>
        </div>
        <button class="close-button" id="closeShare" type="button" aria-label="Close share options">×</button>
      </div>

      <div class="filter-grid">
        <label for="shareFrom">From date</label>
        <input id="shareFrom" type="date">

        <label for="shareTo">To date</label>
        <input id="shareTo" type="date">
      </div>

      <label for="shareSearch">Only include plans containing</label>
      <input id="shareSearch" type="text" placeholder="Optional word or phrase">

      <label class="checkbox-row" for="shareInfo">
        <input id="shareInfo" type="checkbox" checked>
        Include extra information
      </label>

      <div class="share-actions">
        <button class="primary-button" id="generateShareLink" type="submit">Generate Link</button>
        <button class="today-button" id="copyShareLink" type="button">Copy Link</button>
      </div>

      <label for="shareLink">Share URL</label>
      <textarea id="shareLink" rows="4" readonly placeholder="Generate a link to share filtered plans."></textarea>
      <p class="share-status" id="shareStatus">No link generated yet.</p>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
